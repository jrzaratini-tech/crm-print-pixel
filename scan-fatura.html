<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ler QR Fiscal - PrintPixel</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: linear-gradient(135deg, #172554, #4c1d95); color: #172554; font-family: Arial, sans-serif; }
        main { max-width: 520px; margin: 0 auto; padding: 24px; background: #fff; border-radius: 18px; box-shadow: 0 16px 48px rgba(0,0,0,.25); }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { color: #64748b; line-height: 1.45; }
        video { display: none; width: 100%; min-height: 260px; margin: 16px 0; border-radius: 12px; background: #0f172a; object-fit: cover; }
        textarea { width: 100%; min-height: 115px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; resize: vertical; }
        button { width: 100%; margin-top: 12px; padding: 14px; border: 0; border-radius: 10px; color: #fff; background: #2563eb; cursor: pointer; font-weight: 700; }
        button.secondary { background: #475569; }
        .choice { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0; }
        .choice button { min-height: 92px; margin: 0; padding: 12px; background: #eff6ff; color: #1e3a8a; border: 2px solid #bfdbfe; }
        .choice button.personal { background: #fff7ed; color: #9a3412; border-color: #fdba74; }
        .choice button.selected { border-color: #172554; box-shadow: 0 0 0 3px rgba(23,37,84,.12); }
        .choice strong, .choice span { display: block; }
        .choice span { margin-top: 5px; font-size: 12px; line-height: 1.35; }
        .selected-mode { margin: 12px 0; padding: 11px; border-radius: 9px; background: #dbeafe; color: #1e3a8a; font-weight: 700; }
        .selected-mode.personal { background: #ffedd5; color: #9a3412; }
        button:disabled { cursor: wait; opacity: .65; }
        .status { margin-top: 16px; padding: 12px; border-radius: 10px; background: #eff6ff; color: #1d4ed8; }
        .status.success { background: #ecfdf5; color: #047857; }
        .status.error { background: #fef2f2; color: #b91c1c; }
    </style>
</head>
<body>
    <main>
        <h1>Ler QR fiscal da fatura</h1>
        <p>Antes da leitura, informe se a compra pertence à empresa ou se foi um gasto pessoal.</p>
        <div class="choice">
            <button type="button" data-expense-mode="normal"><strong>Despesa da empresa</strong><span>Usar os dados fiscais da nota</span></button>
            <button type="button" class="personal" data-expense-mode="SALÁRIO"><strong>Gasto pessoal</strong><span>Lançar o total pago como SALÁRIO</span></button>
        </div>
        <input type="hidden" id="expenseMode" value="">
        <div id="scanTools" hidden>
            <div class="selected-mode" id="selectedMode"></div>
            <video id="camera" playsinline muted></video>
            <button id="openCamera">Abrir câmera</button>
            <button id="stopCamera" class="secondary" hidden>Parar câmera</button>
            <p>Também pode colar manualmente o conteúdo bruto do QR fiscal:</p>
            <textarea id="rawQr" placeholder="A:...*B:...*F:...*G:..."></textarea>
            <button id="sendQr">Enviar para revisão</button>
        </div>
        <div class="status" id="status">Sessão pronta para leitura.</div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get('token') || '';
        const camera = document.getElementById('camera');
        const rawQr = document.getElementById('rawQr');
        const statusBox = document.getElementById('status');
        const openCamera = document.getElementById('openCamera');
        const stopCameraButton = document.getElementById('stopCamera');
        const sendQr = document.getElementById('sendQr');
        const expenseMode = document.getElementById('expenseMode');
        const scanTools = document.getElementById('scanTools');
        const selectedMode = document.getElementById('selectedMode');
        let stream = null;
        let scanTimer = null;
        let scanFrame = null;

        function status(message, type = '') {
            statusBox.textContent = message;
            statusBox.className = `status ${type}`;
        }

        function chooseExpenseMode(mode) {
            expenseMode.value = mode;
            document.querySelectorAll('[data-expense-mode]').forEach(button => {
                button.classList.toggle('selected', button.dataset.expenseMode === mode);
            });
            scanTools.hidden = false;
            selectedMode.className = `selected-mode ${mode === 'SALÁRIO' ? 'personal' : ''}`;
            selectedMode.textContent = mode === 'SALÁRIO'
                ? 'Gasto pessoal: será usado o total da nota, incluindo IVA, na categoria SALÁRIO.'
                : 'Despesa da empresa: os dados fiscais da nota serão considerados.';
        }

        function stopScanner() {
            if (scanTimer) clearInterval(scanTimer);
            if (scanFrame) cancelAnimationFrame(scanFrame);
            if (stream) stream.getTracks().forEach(track => track.stop());
            scanTimer = null;
            scanFrame = null;
            stream = null;
            camera.style.display = 'none';
            stopCameraButton.hidden = true;
        }

        async function send(rawValue) {
            const value = String(rawValue || '').trim();
            if (!expenseMode.value) return status('Escolha primeiro se é despesa da empresa ou gasto pessoal.', 'error');
            if (!token || !value) return status('Link ou conteúdo do QR inválido.', 'error');
            stopScanner();
            sendQr.disabled = true;
            openCamera.disabled = true;
            status('A validar a fatura no CRM...');
            try {
                const response = await fetch('/api/importacao-fiscal/receber', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, rawQr: value, expenseMode: expenseMode.value })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.message || 'Não foi possível enviar a fatura.');
                rawQr.value = value;
                status('Fatura recebida. Volte ao CRM para revisar e confirmar o lançamento.', 'success');
            } catch (error) {
                status(error.message, 'error');
                sendQr.disabled = false;
                openCamera.disabled = false;
            }
        }

        function startCanvasScanner() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d', { willReadFrequently: true });
            const tick = () => {
                if (!stream || camera.readyState !== HTMLMediaElement.HAVE_ENOUGH_DATA) return scanFrame = requestAnimationFrame(tick);
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                context.drawImage(camera, 0, 0, canvas.width, canvas.height);
                const image = context.getImageData(0, 0, canvas.width, canvas.height);
                const code = typeof jsQR === 'function' ? jsQR(image.data, image.width, image.height, { inversionAttempts: 'dontInvert' }) : null;
                if (code?.data) return send(code.data);
                scanFrame = requestAnimationFrame(tick);
            };
            tick();
        }

        async function startScanner() {
            if (!expenseMode.value) return status('Escolha primeiro se é despesa da empresa ou gasto pessoal.', 'error');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                camera.srcObject = stream;
                camera.style.display = 'block';
                await camera.play();
                stopCameraButton.hidden = false;
                status('A procurar o QR Code fiscal...');
                if ('BarcodeDetector' in window) {
                    const detector = new BarcodeDetector({ formats: ['qr_code'] });
                    scanTimer = setInterval(async () => {
                        const codes = await detector.detect(camera).catch(() => []);
                        if (codes.length) send(codes[0].rawValue);
                    }, 700);
                    return;
                }
                startCanvasScanner();
            } catch {
                status('Não foi possível abrir a câmera. Verifique a permissão ou cole o conteúdo do QR.', 'error');
            }
        }

        openCamera.addEventListener('click', startScanner);
        stopCameraButton.addEventListener('click', stopScanner);
        sendQr.addEventListener('click', () => send(rawQr.value));
        document.querySelectorAll('[data-expense-mode]').forEach(button => {
            button.addEventListener('click', () => chooseExpenseMode(button.dataset.expenseMode));
        });
        if (!token) status('Link inválido. Gere um novo QR Code no CRM.', 'error');
    </script>
</body>
</html>
