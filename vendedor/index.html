<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a237e">
  <title>PrintPixel Vendedor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar"><div><strong>PrintPixel</strong><span>App comercial</span></div><button id="logoutBtn" hidden>Sair</button></header>
  <section class="login-shell" id="loginShell">
    <form class="login-card" id="loginForm">
      <p class="eyebrow">Acesso do vendedor</p><h1>Entrar no app</h1><p>Use o usuário e senha cadastrados no CRM.</p>
      <label>Usuário<input id="username" maxlength="60" autocomplete="username" required></label>
      <label>Senha<input id="password" type="password" maxlength="120" autocomplete="current-password" required></label>
      <button type="submit">Entrar</button><div class="notice" id="loginNotice" hidden></div>
    </form>
  </section>
  <main id="appShell" hidden>
    <section class="hero"><p class="eyebrow">Painel individual</p><h1 id="sellerName">Carregando...</h1><p>Acompanhe suas vendas e comissões.</p></section>
    <section class="summary"><div><b id="openCount">0</b><span>Em aberto</span></div><div><b id="pendingValue">€0,00</b><span>A receber</span></div><div><b id="paidCount">0</b><span>Pagas</span></div></section>
    <section class="work-section"><h2>Comissões a receber</h2><div class="list" id="pendingList"></div></section>
    <button class="history-toggle" id="historyToggle" type="button">Histórico pago</button>
    <section class="work-section" id="paidSection" hidden><h2>Comissões pagas</h2><div class="list" id="paidList"></div></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
