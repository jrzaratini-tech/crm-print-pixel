<!DOCTYPE html>
<html lang="pt">
<head>
    <script src="../core/security.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiais - PrintPixel</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: #f8fafc; color: #1e293b; padding: 24px; }
        .container { max-width: 1500px; margin: auto; }
        .header { display: flex; justify-content: space-between; gap: 20px; align-items: center; margin-bottom: 24px; }
        h1 { margin: 0; color: #1a237e; }
        .subtitle { color: #64748b; margin: 6px 0 0; }
        .btn { border: 0; border-radius: 7px; padding: 12px 18px; color: white; cursor: pointer; font-weight: 700; }
        .btn-primary { background: #2563eb; }
        .btn-success { background: #059669; }
        .btn-danger { background: #dc2626; }
        .panel { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; box-shadow: 0 3px 16px rgba(15,23,42,.05); margin-bottom: 22px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 14px; }
        label { display: block; color: #475569; font-size: 13px; font-weight: 700; }
        input, select, textarea { width: 100%; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; background: white; }
        textarea { min-height: 70px; resize: vertical; }
        .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
        table { width: 100%; border-collapse: collapse; min-width: 1050px; }
        th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        th { background: #f8fafc; color: #475569; text-transform: uppercase; }
        .table-wrap { overflow-x: auto; }
        .tag { display: inline-block; border-radius: 999px; padding: 4px 8px; color: #1d4ed8; background: #dbeafe; font-size: 12px; }
        .hint { color: #64748b; font-size: 12px; line-height: 1.45; margin: 12px 0 0; }
        .row-actions { display: flex; gap: 7px; }
        .row-actions .btn { padding: 7px 9px; font-size: 12px; }
        .empty { padding: 28px; color: #64748b; text-align: center; }
        .message { margin-top: 12px; font-weight: 700; }
        .success { color: #059669; } .error { color: #dc2626; }
        @media (max-width: 700px) { body { padding: 14px; } .header { display: block; } .header .btn { margin-top: 14px; width: 100%; } }
    </style>
</head>
<body data-page-id="materiais" data-page-type="WRITE">
    <main class="container">
        <div class="header">
            <div>
                <h1>Cadastro de Materiais</h1>
                <p class="subtitle">Base técnica para formar preços por consumo real de matéria-prima.</p>
            </div>
            <button class="btn btn-primary" id="novoBtn">+ NOVO MATERIAL</button>
        </div>

        <section class="panel">
            <h2 id="formTitle">Novo material</h2>
            <input type="hidden" id="materialId">
            <div class="grid">
                <label>Material padrão<select id="presetKey"></select></label>
                <label id="customNameGroup" style="display:none;">Novo nome<input id="nome" placeholder="Informe o nome do material"></label>
                <label id="categoriaGroup">Categoria<select id="categoria">
                    <option>Placa</option><option>Adesivo</option><option>Iluminação</option><option>Perfil</option>
                    <option>Fonte</option><option>Estrutura</option><option>Impressao 3D</option><option>Acabamento</option><option>Outros</option>
                </select></label>
                <label id="formulaGroup">Regra padrão<select id="formulaPadrao">
                    <option value="area">Área aplicada (m²)</option>
                    <option value="placa">Aproveitamento por placa</option>
                    <option value="linear">Comprimento informado (m)</option>
                    <option value="perimetro">Contorno / perímetro (m)</option>
                    <option value="barra">Aproveitamento por barra</option>
                    <option value="densidade_area">Densidade por área (un./m²)</option>
                    <option value="unidade">Quantidade informada (un.)</option>
                </select></label>
                <label id="unidadeGroup">Sistema de medida<select id="unidade">
                    <option value="m²">m²</option><option value="m">metro</option><option value="un">unidade</option>
                    <option value="kg">kg</option><option value="placa">placa</option><option value="barra">barra</option><option value="rolo">rolo</option>
                </select></label>
                <label id="precoTotalGroup"><span id="precoTotalLabel">Preço total sem IVA (€)</span><input id="precoTotal" type="number" min="0" step="0.01" value="0"></label>
                <label id="precoCustoGroup"><span id="precoCustoLabel">Preço calculado</span><input id="precoCusto" type="number" min="0" step="0.01" value="0"></label>
                <label id="perdaGroup">Perda padrão (%)<input id="perdaPercentual" type="number" min="0" step="0.1" value="0"></label>
                <label id="larguraGroup"><span id="larguraLabel">Largura da placa (cm)</span><input id="larguraCm" type="number" min="0" step="0.1" value="0"></label>
                <label id="alturaGroup"><span id="alturaLabel">Altura da placa (cm)</span><input id="alturaCm" type="number" min="0" step="0.1" value="0"></label>
                <label id="comprimentoGroup"><span id="comprimentoLabel">Comprimento comercial (m)</span><input id="comprimentoM" type="number" min="0" step="0.01" value="0"></label>
                <label id="densidadeGroup">Densidade de módulos (un./m²)<input id="densidadePorM2" type="number" min="0" step="0.1" value="0"></label>
            </div>
            <div class="grid" id="variantFields" style="margin-top:14px;"></div>
            <label style="margin-top:14px;">Observações<textarea id="observacoes" placeholder="Fornecedor, espessura, cor, aplicação ou critérios de cálculo."></textarea></label>
            <p class="hint" id="calcHint">Informe apenas os campos necessários para este material.</p>
            <div class="actions">
                <button class="btn btn-success" id="salvarBtn">SALVAR MATERIAL</button>
            </div>
            <div id="message" class="message"></div>
        </section>

        <section class="panel">
            <h2>Materiais cadastrados</h2>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Material</th><th>Categoria</th><th>Regra</th><th>Preço</th><th>Perda</th><th>Parâmetros</th><th>Ações</th></tr></thead>
                    <tbody id="materialsBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../core/custeio.js"></script>
    <script src="../core/materiais-padrao.js"></script>
    <script>
        const ids = ['nome', 'categoria', 'formulaPadrao', 'unidade', 'precoTotal', 'precoCusto', 'perdaPercentual', 'larguraCm', 'alturaCm', 'comprimentoM', 'densidadePorM2', 'observacoes'];
        let materiais = [];
        const money = value => new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(Number(value) || 0);
        const number = id => Number.parseFloat(document.getElementById(id).value) || 0;
        const presetSelect = document.getElementById('presetKey');
        const groups = ['categoriaGroup', 'formulaGroup', 'unidadeGroup', 'precoTotalGroup', 'precoCustoGroup', 'perdaGroup', 'larguraGroup', 'alturaGroup', 'comprimentoGroup', 'densidadeGroup'];

        function renderPresetOptions() {
            presetSelect.innerHTML = MATERIAIS_PADRAO.materiais.map(material => `<option value="${material.key}">${material.nome}</option>`).join('');
        }

        function renderVariantFields(variantes = {}) {
            const preset = MATERIAIS_PADRAO.get(presetSelect.value);
            document.getElementById('customNameGroup').style.display = preset.key === 'outro' ? 'block' : 'none';
            document.getElementById('variantFields').innerHTML = preset.questions.map(item => {
                const value = variantes[item.key] ?? item.fixed ?? '';
                if (item.fixed) return `<label>${item.label}<input data-variant="${item.key}" value="${item.fixed}" readonly></label>`;
                if (item.options.length) return `<label>${item.label}<select data-variant="${item.key}"><option value="">Selecione</option>${item.options.map(option => `<option ${option === value ? 'selected' : ''}>${option}</option>`).join('')}</select></label>`;
                return `<label>${item.label}<input data-variant="${item.key}" value="${value}"></label>`;
            }).join('');
            document.getElementById('categoria').value = preset.categoria;
            document.getElementById('formulaPadrao').value = preset.formulaPadrao;
            document.getElementById('unidade').value = preset.unidade;
            if (preset.comprimentoM) document.getElementById('comprimentoM').value = preset.comprimentoM;
            applyMaterialLayout();
            updateCalculatedPrice();
        }

        function setVisible(id, visible) {
            document.getElementById(id).style.display = visible ? 'block' : 'none';
        }

        function isPlatePreset(key) {
            return ['acrilico', 'acm', 'pvc_expandido'].includes(key);
        }

        function isLinearPreset(key) {
            return ['fita_led_zigzag', 'fita_led_vtec', 'led_neon', 'metalon_aluminio', 'perfil_caixa_slim', 'perfil_caixa_luz'].includes(key);
        }

        function applyMaterialLayout() {
            const preset = MATERIAIS_PADRAO.get(presetSelect.value);
            groups.forEach(id => setVisible(id, false));
            setVisible('categoriaGroup', true);
            setVisible('unidadeGroup', true);
            setVisible('precoCustoGroup', true);
            document.getElementById('precoCusto').readOnly = false;
            document.getElementById('precoCustoLabel').textContent = 'Preço de custo (€)';
            document.getElementById('calcHint').textContent = 'Informe apenas os campos necessários para este material.';

            if (isPlatePreset(preset.key)) {
                document.getElementById('formulaPadrao').value = 'area';
                document.getElementById('unidade').value = 'm²';
                ['precoTotalGroup', 'perdaGroup', 'larguraGroup', 'alturaGroup'].forEach(id => setVisible(id, true));
                document.getElementById('precoTotalLabel').textContent = 'Preço total da placa sem IVA (€)';
                document.getElementById('precoCustoLabel').textContent = 'Preço calculado por m² (€)';
                document.getElementById('precoCusto').readOnly = true;
                document.getElementById('calcHint').textContent = 'Para placas: informe o preço total da placa e o tamanho comercial. O CRM calcula automaticamente o €/m² usado no orçamento.';
            } else if (isLinearPreset(preset.key)) {
                document.getElementById('formulaPadrao').value = 'linear';
                document.getElementById('unidade').value = 'm';
                ['precoTotalGroup', 'perdaGroup', 'comprimentoGroup'].forEach(id => setVisible(id, true));
                document.getElementById('precoTotalLabel').textContent = preset.key.includes('fita') || preset.key === 'led_neon' ? 'Preço total do rolo sem IVA (€)' : 'Preço total da barra sem IVA (€)';
                document.getElementById('comprimentoLabel').textContent = preset.key.includes('fita') || preset.key === 'led_neon' ? 'Metros no rolo' : 'Comprimento da barra (m)';
                document.getElementById('precoCustoLabel').textContent = 'Preço calculado por metro (€)';
                document.getElementById('precoCusto').readOnly = true;
                document.getElementById('calcHint').textContent = 'Para rolos e barras: informe o preço total e o comprimento. O CRM calcula automaticamente o €/metro.';
            } else if (preset.key === 'modulo_led_1w') {
                document.getElementById('formulaPadrao').value = 'densidade_area';
                document.getElementById('unidade').value = 'un';
                ['perdaGroup', 'densidadeGroup'].forEach(id => setVisible(id, true));
                document.getElementById('precoCustoLabel').textContent = 'Preço por módulo (€)';
            } else if (preset.key === 'adesivo') {
                document.getElementById('formulaPadrao').value = 'area';
                document.getElementById('unidade').value = 'm²';
                setVisible('perdaGroup', true);
                document.getElementById('precoCustoLabel').textContent = 'Preço por m² (€)';
            } else if (preset.key === 'filamento_petg') {
                document.getElementById('formulaPadrao').value = 'unidade';
                document.getElementById('unidade').value = 'kg';
                document.getElementById('precoCustoLabel').textContent = 'Preço por kg (€)';
            } else {
                document.getElementById('formulaPadrao').value = preset.formulaPadrao;
                document.getElementById('unidade').value = preset.unidade;
                if (preset.key === 'outro') {
                    ['formulaGroup', 'precoTotalGroup', 'perdaGroup', 'larguraGroup', 'alturaGroup', 'comprimentoGroup', 'densidadeGroup'].forEach(id => setVisible(id, true));
                    document.getElementById('precoCustoLabel').textContent = 'Preço unitário de consumo (€)';
                } else {
                    document.getElementById('precoCustoLabel').textContent = 'Preço unitário (€)';
                }
            }
        }

        function updateCalculatedPrice() {
            const preset = MATERIAIS_PADRAO.get(presetSelect.value);
            const precoTotal = number('precoTotal');
            let calculated = number('precoCusto');
            if (isPlatePreset(preset.key)) {
                const area = (number('larguraCm') / 100) * (number('alturaCm') / 100);
                calculated = area > 0 && precoTotal > 0 ? precoTotal / area : 0;
            } else if (isLinearPreset(preset.key)) {
                calculated = number('comprimentoM') > 0 && precoTotal > 0 ? precoTotal / number('comprimentoM') : 0;
            }
            if ((isPlatePreset(preset.key) || isLinearPreset(preset.key)) && precoTotal > 0) {
                document.getElementById('precoCusto').value = calculated ? calculated.toFixed(4) : '0';
            }
        }

        function variantesFromForm() {
            return Object.fromEntries(Array.from(document.querySelectorAll('[data-variant]')).map(element => [element.dataset.variant, element.value]));
        }

        function showMessage(text, type = 'success') {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;
        }

        function resetForm() {
            document.getElementById('materialId').value = '';
            document.getElementById('formTitle').textContent = 'Novo material';
            ids.forEach(id => {
                const element = document.getElementById(id);
                element.value = ['precoTotal', 'precoCusto', 'perdaPercentual', 'larguraCm', 'alturaCm', 'comprimentoM', 'densidadePorM2'].includes(id) ? '0' : '';
            });
            document.getElementById('categoria').value = 'Placa';
            document.getElementById('formulaPadrao').value = 'area';
            document.getElementById('unidade').value = 'm²';
            presetSelect.value = 'fonte';
            renderVariantFields();
        }

        function formData() {
            const preset = MATERIAIS_PADRAO.get(presetSelect.value);
            const variantes = variantesFromForm();
            return {
                presetKey: preset.key,
                nome: preset.key === 'outro' ? document.getElementById('nome').value.trim() : `${preset.nome}${MATERIAIS_PADRAO.labelVariantes(variantes) ? ' - ' + MATERIAIS_PADRAO.labelVariantes(variantes) : ''}`,
                variantes,
                categoria: document.getElementById('categoria').value,
                formulaPadrao: document.getElementById('formulaPadrao').value,
                unidade: document.getElementById('unidade').value,
                precoTotal: number('precoTotal'),
                precoCusto: number('precoCusto'),
                perdaPercentual: number('perdaPercentual'),
                larguraCm: number('larguraCm'),
                alturaCm: number('alturaCm'),
                comprimentoM: number('comprimentoM'),
                densidadePorM2: number('densidadePorM2'),
                observacoes: document.getElementById('observacoes').value.trim(),
                ativo: true
            };
        }

        function parametros(material) {
            const values = [];
            if (material.larguraCm && material.alturaCm) values.push(`${material.larguraCm} x ${material.alturaCm} cm`);
            if (material.comprimentoM) values.push(`${material.comprimentoM} m`);
            if (material.densidadePorM2) values.push(`${material.densidadePorM2} un./m²`);
            return values.join(' | ') || '-';
        }

        function render() {
            const body = document.getElementById('materialsBody');
            body.innerHTML = materiais.length ? materiais.map(material => `
                <tr>
                    <td><strong>${material.nome}</strong><br><span style="color:#64748b">${material.unidade}</span></td>
                    <td><span class="tag">${material.categoria}</span></td>
                    <td>${CUSTEIO.formulas[material.formulaPadrao] || material.formulaPadrao}</td>
                    <td>${money(material.precoCusto)}</td>
                    <td>${material.perdaPercentual || 0}%</td>
                    <td>${parametros(material)}</td>
                    <td><div class="row-actions"><button class="btn btn-primary" onclick="editar('${material.id}')">Editar</button><button class="btn btn-danger" onclick="excluir('${material.id}')">Excluir</button></div></td>
                </tr>`).join('') : '<tr><td colspan="7" class="empty">Cadastre os materiais usados na fabricação para ativar o custeio técnico nos orçamentos.</td></tr>';
        }

        async function load() {
            const response = await fetch('/api/database/query', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ schema: 'material', limit: 500 }) });
            const result = await response.json();
            materiais = (result.events || []).map(event => ({ id: event.id, ...event.payload })).filter(material => material.ativo !== false).sort((a, b) => a.nome.localeCompare(b.nome));
            render();
        }

        window.editar = id => {
            const material = materiais.find(item => item.id === id);
            if (!material) return;
            document.getElementById('materialId').value = id;
            document.getElementById('formTitle').textContent = 'Editar material';
            ids.forEach(field => { document.getElementById(field).value = material[field] ?? ''; });
            presetSelect.value = material.presetKey || 'outro';
            renderVariantFields(material.variantes || {});
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.excluir = async id => {
            if (!confirm('Excluir este material do catálogo?')) return;
            await fetch('/api/database/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
            showMessage('Material excluído.');
            await load();
        };

        document.getElementById('novoBtn').addEventListener('click', resetForm);
        presetSelect.addEventListener('change', () => renderVariantFields());
        ['precoTotal', 'larguraCm', 'alturaCm', 'comprimentoM'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateCalculatedPrice);
        });
        document.getElementById('salvarBtn').addEventListener('click', async () => {
            const payload = formData();
            if (!payload.nome) return showMessage('Informe o nome do material.', 'error');
            const body = { schema: 'material', payload, pageId: 'materiais' };
            const id = document.getElementById('materialId').value;
            if (id) body.id = id;
            const response = await fetch('/api/database/commit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (!response.ok) return showMessage('Não foi possível salvar o material.', 'error');
            resetForm();
            showMessage('Material salvo com sucesso.');
            await load();
        });

        renderPresetOptions();
        resetForm();
        load().catch(error => {
            console.error('Erro ao carregar materiais:', error);
            showMessage('Não foi possível carregar os materiais.', 'error');
        });
    </script>
</body>
</html>
