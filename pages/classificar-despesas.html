<!DOCTYPE html>
<html lang="pt">
<head>
  <script src="../core/security.js"></script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Despesas a Classificar - PrintPixel</title>
  <style>
    *{box-sizing:border-box;font-family:Segoe UI,system-ui,sans-serif}body{margin:0;padding:24px;background:#f4f7fb;color:#10233f}.container{max-width:1300px;margin:auto}.panel,.card{background:#fff;border:1px solid #dce5f2;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 8px 24px #0f172a0d}h1{margin:0;color:#1a237e}.subtitle{color:#64748b}.list{display:grid;gap:14px}.card{display:grid;gap:12px}.meta{display:flex;flex-wrap:wrap;gap:10px;color:#64748b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}input,select{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px}label{font-size:12px;font-weight:800;color:#334155}.btn{border:0;border-radius:10px;padding:11px 14px;background:#1a237e;color:#fff;font-weight:800;cursor:pointer}.message{font-weight:800;color:#047857;min-height:20px}
  </style>
</head>
<body data-page-id="classificar_despesas" data-page-type="WRITE">
  <main class="container">
    <section class="panel"><h1>Despesas a Classificar</h1><p class="subtitle">Aqui aparecem despesas antigas e novas que vieram sem fornecedor/categoria confiável.</p><div class="message" id="message"></div></section>
    <section class="list" id="list"></section>
  </main>
  <script>
    const CATEGORIES = ['ÁGUA','AMAZON','ALIMENTAÇÃO','ARRENDAMENTO','COMISSÃO','CONTABILIDADE','CTT','COMBUSTÍVEL','CAFÉ','DIMATUR','DAGOL','ENERGIA','FILAMENTO 3D','IMPOSTOS','LEROY MERLIN','LUZACRIL','MANUTENÇÃO','MATERIAL ESCRITORIO','MAKRO','PLOTTERZONE','POLEGADA LED','SALÁRIO','SANTANDER','TRANSPORTE','TELEFONE/INTERNET','WEDDT','OUTROS'];
    const money = v => Number(v||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR'});
    async function api(path, options={}){
      const r=await fetch(path,{...options,headers:{'Content-Type':'application/json',Accept:'application/json',...(options.headers||{})}});
      const raw=await r.text();
      let b={};
      try{b=raw?JSON.parse(raw):{};}catch{
        const html=raw.trim().startsWith('<');
        throw new Error(html?'A API retornou uma pagina HTML em vez de JSON. Atualize o servidor e tente novamente.':'Resposta invalida do servidor.');
      }
      if(!r.ok)throw new Error(b.message||b.error||'Erro');
      return b;
    }
    function options(selected){return CATEGORIES.map(c=>`<option value="${c}" ${c===(selected||'')?'selected':''}>${c}</option>`).join('');}
    async function classify(id, card){
      const body={supplierName:card.querySelector('[data-name]').value,nif:card.querySelector('[data-nif]').value,category:card.querySelector('[data-category]').value,expenseType:card.querySelector('[data-type]').value,ivaDedutivel:card.querySelector('[data-iva]').value==='true',applyToSameNif:card.querySelector('[data-apply]').checked};
      const result=await api('/api/expenses/'+id+'/classify',{method:'POST',body:JSON.stringify(body)});
      document.getElementById('message').textContent=`${result.updatedCount} despesa(s) atualizada(s).`;
      await load();
    }
    async function load(){
      const result=await api('/api/expenses/unclassified');const list=document.getElementById('list');list.replaceChildren();
      if(!result.expenses.length){list.innerHTML='<div class="panel">Nenhuma despesa pendente de classificação.</div>';return;}
      result.expenses.forEach(exp=>{const card=document.createElement('article');card.className='card';card.innerHTML=`<h2>${exp.fornecedor||'Fornecedor não identificado'}</h2><div class="meta"><span>NIF ${exp.nifFornecedor||'sem NIF'}</span><span>${exp.numeroFatura||''}</span><span>${exp.dataCompra||exp.data||''}</span><strong>${money(exp.valorTotal)}</strong></div><div class="grid"><label>Fornecedor<input data-name value="${exp.fornecedor&& !String(exp.fornecedor).startsWith('Fornecedor NIF')?exp.fornecedor:''}"></label><label>NIF<input data-nif value="${exp.nifFornecedor||''}"></label><label>Categoria<select data-category>${options(exp.categoria)}</select></label><label>Tipo despesa<input data-type value="${exp.tipoDespesa||''}"></label><label>IVA dedutível<select data-iva><option value="true">Sim</option><option value="false">Não</option></select></label><label><input type="checkbox" data-apply checked> aplicar a antigas com este NIF</label><button class="btn">Classificar</button></div>`;card.querySelector('button').onclick=()=>classify(exp.id,card).catch(e=>document.getElementById('message').textContent=e.message);list.append(card);});
    }
    load().catch(e=>document.getElementById('message').textContent=e.message);
  </script>
</body>
</html>
