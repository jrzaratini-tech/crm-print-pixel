<!DOCTYPE html>
<html lang="pt">
<head>
  <script src="../core/security.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lançamentos Fiscais - PrintPixel</title>
  <style>
    *{box-sizing:border-box;font-family:Segoe UI,system-ui,sans-serif}body{margin:0;padding:24px;background:#f8fafc;color:#1e293b}.container{max-width:1400px;margin:auto}.header{display:flex;justify-content:space-between;gap:16px;align-items:center}h1{margin:0;color:#1a237e}.subtitle{color:#64748b}.btn{border:0;border-radius:8px;padding:10px 13px;background:#475569;color:#fff;font-weight:700;cursor:pointer}.card{padding:18px;margin:14px 0;border:1px solid #e2e8f0;border-radius:12px;background:#fff;box-shadow:0 3px 14px #0f172a0d}.top{display:flex;justify-content:space-between;gap:12px}.tag{display:inline-block;padding:4px 8px;border-radius:999px;background:#d1fae5;color:#065f46;font-size:12px;font-weight:700}.details{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:16px;color:#475569}.details strong{display:block;color:#1e293b}.empty{padding:30px;text-align:center;color:#64748b}
  </style>
</head>
<body data-page-id="importacoes-fiscais" data-page-type="READ">
  <main class="container">
    <div class="header"><div><h1>Últimos lançamentos fiscais</h1><p class="subtitle">Os 10 documentos mais recentes lançados automaticamente pelo app móvel.</p></div><button class="btn" id="refreshBtn">Atualizar</button></div>
    <section id="list"></section>
  </main>
  <script>
    const list = document.getElementById('list');
    const money = value => Number(value || 0).toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' });
    function add(parent, tag, text, className) { const node = document.createElement(tag); node.textContent = text; if (className) node.className = className; parent.append(node); return node; }
    function render(documents) {
      list.replaceChildren();
      if (!documents.length) return add(list, 'div', 'Nenhum documento lançado pelo app ainda.', 'empty');
      documents.forEach(item => {
        const card = add(list, 'article', '', 'card');
        const top = add(card, 'div', '', 'top');
        add(top, 'strong', `${item.entryType === 'income' ? 'VENDA' : 'COMPRA'} · ${item.tipoDocumento} ${item.numeroFatura}`);
        add(top, 'span', 'Lançado', 'tag');
        const details = add(card, 'div', '', 'details');
        [['Emitente', `${item.nomeEmitente || 'Não informado'} · ${item.nifEmitente}`], ['Adquirente', item.nifAdquirente || 'Não informado'], ['Data', item.dataCompra], ['Base sem IVA', money(item.valorBruto)], ['IVA', money(item.valorIVA)], ['Total', money(item.valorTotal)], ['Origem', item.source === 'mobile_qr' ? 'QR Code' : 'Manual'], ['Dispositivo', item.deviceName]].forEach(([label, value]) => {
          const cell = add(details, 'div', '');
          add(cell, 'strong', label);
          add(cell, 'span', value);
        });
      });
    }
    async function load() {
      const response = await fetch('/api/mobile/inbox');
      const body = await response.json();
      if (!response.ok) return alert(body.message || 'Não foi possível carregar os lançamentos.');
      render(body.documents);
    }
    document.getElementById('refreshBtn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
