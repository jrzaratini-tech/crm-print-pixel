<!DOCTYPE html>
<html lang="pt">
<head>
    <script src="../core/security.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - PrintPixel</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: #f8fafc; color: #0f172a; padding: 24px; }
        .container { max-width: 1450px; margin: auto; }
        .header { display: flex; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 22px; }
        h1 { margin: 0; color: #1a237e; font-size: 30px; }
        h2 { margin: 0 0 16px; color: #0f172a; }
        .subtitle { color: #64748b; margin: 6px 0 0; line-height: 1.45; }
        .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; box-shadow: 0 8px 28px rgba(15,23,42,.05); margin-bottom: 20px; }
        .btn { border: 0; border-radius: 9px; padding: 11px 16px; color: white; cursor: pointer; font-weight: 800; }
        .btn-primary { background: #2563eb; }
        .btn-success { background: #059669; }
        .btn-danger { background: #dc2626; }
        .btn-secondary { background: #475569; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; align-items: end; }
        label { display: block; color: #334155; font-size: 13px; font-weight: 800; }
        input, select, textarea { width: 100%; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 11px; background: white; color: #0f172a; }
        textarea { resize: vertical; min-height: 74px; }
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-5 { grid-column: span 5; }
        .col-2 { grid-column: span 2; }
        .col-12 { grid-column: span 12; }
        .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .toolbar { display: flex; justify-content: space-between; gap: 14px; align-items: center; margin-bottom: 14px; }
        .toolbar input { max-width: 360px; margin: 0; }
        .table-wrap { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th, td { padding: 13px 12px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 13px; vertical-align: middle; }
        th { background: #f1f5f9; color: #334155; text-transform: uppercase; letter-spacing: .03em; }
        tr:last-child td { border-bottom: 0; }
        .tag { display: inline-flex; border-radius: 999px; padding: 5px 9px; background: #dbeafe; color: #1d4ed8; font-weight: 800; font-size: 12px; }
        .source { color: #64748b; font-size: 12px; margin-top: 4px; }
        .row-actions { display: flex; gap: 8px; }
        .row-actions .btn { padding: 8px 10px; font-size: 12px; }
        .empty { text-align: center; color: #64748b; padding: 30px; }
        .message { margin-top: 12px; font-weight: 800; }
        .success { color: #059669; }
        .error { color: #dc2626; }
        @media (max-width: 800px) {
            body { padding: 14px; }
            .header, .toolbar { display: block; }
            .header .btn, .toolbar input { width: 100%; max-width: none; margin-top: 12px; }
            .grid { grid-template-columns: 1fr; }
            .col-3, .col-4, .col-5, .col-12 { grid-column: auto; }
        }
    </style>
</head>
<body data-page-id="produtos" data-page-type="WRITE">
    <main class="container">
        <div class="header">
            <div>
                <h1>Cadastro de Produtos</h1>
                <p class="subtitle">Gerencie a lista usada em pedidos e orcamentos. Produtos antigos continuam preservados nos registros ja criados.</p>
            </div>
            <button class="btn btn-primary" id="newBtn">+ NOVO PRODUTO</button>
        </div>

        <section class="panel">
            <h2 id="formTitle">Novo produto</h2>
            <input type="hidden" id="productId">
            <div class="grid">
                <label class="col-5">Nome do produto
                    <input id="nome" maxlength="160" placeholder="Ex: Letra caixa impressa em PETG">
                </label>
                <label class="col-3">Tipo
                    <select id="tipoProduto">
                        <option value="fabricacao">Produto de fabricacao</option>
                        <option value="loja">Produto loja / preco fixo</option>
                    </select>
                </label>
                <label class="col-3">Categoria
                    <select id="categoria">
                        <option>Letreiro</option>
                        <option>Acrilico</option>
                        <option>Neon LED</option>
                        <option>ACM</option>
                        <option>Caixa de luz</option>
                        <option>Impressao digital</option>
                        <option>Impressao 3D</option>
                        <option>Brindes</option>
                        <option>Produtos</option>
                        <option>Outros</option>
                    </select>
                </label>
                <label class="col-4">Estado
                    <select id="ativo">
                        <option value="true">Ativo no catalogo</option>
                        <option value="false">Inativo</option>
                    </select>
                </label>
                <label class="col-2">Preco venda sem IVA
                    <input id="precoVenda" type="number" min="0" step="0.01" placeholder="0.00">
                </label>
                <label class="col-2">Custo unitario
                    <input id="custoUnitario" type="number" min="0" step="0.01" placeholder="0.00">
                </label>
                <label class="col-2">SKU / codigo
                    <input id="sku" maxlength="80" placeholder="Opcional">
                </label>
                <label class="col-12">Descricao interna
                    <textarea id="descricao" maxlength="500" placeholder="Notas comerciais, uso ideal ou detalhes para a equipe."></textarea>
                </label>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" id="cancelBtn" type="button">LIMPAR</button>
                <button class="btn btn-success" id="saveBtn" type="button">SALVAR PRODUTO</button>
            </div>
            <div id="message" class="message"></div>
        </section>

        <section class="panel">
            <div class="toolbar">
                <div>
                    <h2>Produtos cadastrados</h2>
                    <p class="subtitle" id="countLabel">Carregando produtos...</p>
                </div>
                <input id="searchInput" placeholder="Pesquisar produto ou categoria">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Produto</th><th>Tipo</th><th>Categoria</th><th>Preco sem IVA</th><th>Descricao</th><th>Acoes</th></tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let products = [];
        const fields = ['nome', 'tipoProduto', 'categoria', 'precoVenda', 'custoUnitario', 'sku', 'descricao', 'ativo'];
        const money = value => Number(value || 0).toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' });

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
        }

        function showMessage(text, type = 'success') {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;
        }

        function resetForm() {
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').textContent = 'Novo produto';
            document.getElementById('nome').value = '';
            document.getElementById('tipoProduto').value = 'fabricacao';
            document.getElementById('categoria').value = 'Produtos';
            document.getElementById('precoVenda').value = '';
            document.getElementById('custoUnitario').value = '';
            document.getElementById('sku').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('ativo').value = 'true';
            document.getElementById('nome').focus();
        }

        function formData() {
            return {
                id: document.getElementById('productId').value,
                nome: document.getElementById('nome').value.trim(),
                tipoProduto: document.getElementById('tipoProduto').value,
                categoria: document.getElementById('categoria').value,
                precoVenda: parseFloat(document.getElementById('precoVenda').value) || 0,
                custoUnitario: parseFloat(document.getElementById('custoUnitario').value) || 0,
                sku: document.getElementById('sku').value.trim(),
                descricao: document.getElementById('descricao').value.trim(),
                ativo: document.getElementById('ativo').value === 'true'
            };
        }

        function render() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = products.filter(product => [product.nome, product.categoria, product.descricao].join(' ').toLowerCase().includes(search));
            document.getElementById('countLabel').textContent = `${filtered.length} de ${products.length} produtos ativos no catalogo`;
            document.getElementById('productsBody').innerHTML = filtered.length ? filtered.map(product => `
                <tr>
                    <td>
                        <strong>${escapeHtml(product.nome)}</strong>
                        <div class="source">${product.source === 'default' ? 'Produto padrao do CRM' : 'Produto criado no cadastro'}${product.sku ? ' · SKU ' + escapeHtml(product.sku) : ''}</div>
                    </td>
                    <td><span class="tag">${product.tipoProduto === 'loja' ? 'Produto loja' : 'Fabricacao'}</span></td>
                    <td><span class="tag">${escapeHtml(product.categoria || 'Produtos')}</span></td>
                    <td>${product.tipoProduto === 'loja' ? money(product.precoVenda) : '-'}</td>
                    <td>${escapeHtml(product.descricao || '-')}</td>
                    <td><div class="row-actions">
                        <button class="btn btn-primary" onclick="editProduct('${escapeHtml(product.id)}')">Editar</button>
                        <button class="btn btn-danger" onclick="deleteProduct('${escapeHtml(product.id)}')">Excluir</button>
                    </div></td>
                </tr>
            `).join('') : '<tr><td colspan="6" class="empty">Nenhum produto encontrado.</td></tr>';
        }

        async function loadProducts() {
            const response = await fetch('/api/products');
            const result = await response.json();
            if (!response.ok || !result.success) throw new Error(result.message || 'Erro ao carregar produtos');
            products = result.products || [];
            render();
        }

        window.editProduct = id => {
            const product = products.find(item => item.id === id);
            if (!product) return;
            document.getElementById('productId').value = product.id;
            document.getElementById('formTitle').textContent = 'Editar produto';
            fields.forEach(field => {
                const fallback = field === 'tipoProduto' ? 'fabricacao' : (['precoVenda', 'custoUnitario'].includes(field) ? 0 : '');
                document.getElementById(field).value = field === 'ativo' ? String(product.ativo !== false) : (product[field] ?? fallback);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteProduct = async id => {
            const product = products.find(item => item.id === id);
            if (!product) return;
            if (!confirm(`Excluir "${product.nome}" do catalogo de produtos? Pedidos e orcamentos antigos nao serao apagados.`)) return;
            const response = await fetch(`/api/products/${encodeURIComponent(id)}/delete`, { method: 'POST' });
            const result = await response.json();
            if (!response.ok || !result.success) return showMessage(result.message || 'Nao foi possivel excluir o produto.', 'error');
            showMessage('Produto excluido do catalogo.');
            await loadProducts();
        };

        document.getElementById('newBtn').addEventListener('click', resetForm);
        document.getElementById('cancelBtn').addEventListener('click', resetForm);
        document.getElementById('searchInput').addEventListener('input', render);
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const payload = formData();
            if (!payload.nome) return showMessage('Informe o nome do produto.', 'error');
            const response = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (!response.ok || !result.success) return showMessage(result.message || 'Nao foi possivel salvar o produto.', 'error');
            resetForm();
            showMessage('Produto salvo com sucesso.');
            await loadProducts();
        });

        resetForm();
        loadProducts().catch(error => {
            console.error('Erro ao carregar produtos:', error);
            showMessage('Nao foi possivel carregar os produtos.', 'error');
        });
    </script>
</body>
</html>
